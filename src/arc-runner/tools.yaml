# ARC Runner Image Configuration
# GitHub Actions Runner Controller runner with DevOps tools
base: ghcr.io/actions/actions-runner:latest
package_manager: apt
multi_arch: false
user: runner

tools:
  - name: build-essential
    description: C/C++ compiler and build tools
    method: package
    package: build-essential

  - name: jq
    description: JSON processor
    method: package
    package: jq

  - name: gh
    description: GitHub CLI
    method: script
    script: |
      curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
      chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" > /etc/apt/sources.list.d/github-cli.list
      apt-get update
      apt-get install -y --no-install-recommends gh
      rm -rf /var/lib/apt/lists/*

  - name: node
    description: Node.js runtime
    method: script
    script: |
      curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
      apt-get update
      apt-get install -y --no-install-recommends nodejs
      rm -rf /var/lib/apt/lists/*

  - name: node20-alpine-externals
    description: Node 20 musl in runner externals for Alpine job containers
    method: script
    script: |
      # Without this, JS actions (e.g. actions/create-github-app-token) fail
      # inside Alpine-based job containers (those set via the `container:`
      # workflow directive) with:
      #   stat /__e/node20_alpine/bin/node: no such file or directory
      # The GH Actions runner mounts /home/runner/externals as /__e in the
      # job container; we place the musl-linked node20 there so the runner
      # can inject it when it detects Alpine via /etc/*release.
      NODE_VERSION="20.18.1"
      EXTERNALS_DIR="/home/runner/externals/node20_alpine"
      mkdir -p "$EXTERNALS_DIR"
      curl -fsSL "https://unofficial-builds.nodejs.org/download/release/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64-musl.tar.gz" -o /tmp/node-alpine.tar.gz
      tar -xz -f /tmp/node-alpine.tar.gz -C "$EXTERNALS_DIR" --strip-components=1
      rm /tmp/node-alpine.tar.gz
      chown -R runner:runner "$EXTERNALS_DIR"

  - name: yq
    description: YAML processor
    method: binary
    url: https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
    dest: /usr/local/bin/yq

  - name: podman
    description: Container engine
    method: script
    script: |
      apt-get update
      apt-get install -y --no-install-recommends podman buildah skopeo fuse-overlayfs
      mkdir -p /etc/containers
      echo 'unqualified-search-registries = ["docker.io", "ghcr.io"]' > /etc/containers/registries.conf
      rm -rf /var/lib/apt/lists/*

  - name: docker
    description: Docker CLI and buildx plugin
    method: script
    script: |
      curl -fsSL https://download.docker.com/linux/static/stable/x86_64/docker-27.5.1.tgz | tar xz -C /tmp
      mv /tmp/docker/docker /usr/local/bin/docker
      rm -rf /tmp/docker
      mkdir -p /usr/local/lib/docker/cli-plugins
      curl -fsSL -o /usr/local/lib/docker/cli-plugins/docker-buildx https://github.com/docker/buildx/releases/download/v0.21.1/buildx-v0.21.1.linux-amd64
      chmod +x /usr/local/lib/docker/cli-plugins/docker-buildx

  - name: claude
    description: Claude Code CLI
    method: script
    script: |
      npm install -g @anthropic-ai/claude-code

  - name: python3-pip
    description: Python package installer and venv support
    method: script
    script: |
      apt-get update
      apt-get install -y --no-install-recommends python3-pip python3-venv
      rm -rf /var/lib/apt/lists/*

  - name: playwright-deps
    description: Playwright/Chromium browser dependencies
    method: script
    script: |
      apt-get update
      apt-get install -y --no-install-recommends libnspr4 libnss3 libatk1.0-0t64 libatk-bridge2.0-0t64 libcups2t64 libdrm2 libdbus-1-3 libatspi2.0-0t64 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libxkbcommon0 libpango-1.0-0 libcairo2 libasound2t64 fonts-liberation xdg-utils
      rm -rf /var/lib/apt/lists/*

